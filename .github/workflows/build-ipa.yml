name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install Dependencies
        run: |
          gem install shenzhen
          gem install ios-deploy
          gem install xcodeproj

      - name: Setup Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Recreate User Schemes
        run: ruby scripts/setup_schemes.rb

      - name: Build IPA (Unsigned)
        run: |
          ipa build --project Chat.z.ai.xcodeproj --scheme Chat.z.ai --configuration Release --sdk iphoneos --no-archive

      - name: Package IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/Release-iphoneos/*.app build/ipa/Payload/ 2>/dev/null || cp -R build/Products/Release-iphoneos/*.app build/ipa/Payload/
          cd build/ipa
          zip -r Chat.z.ai-unsigned.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chat.z.ai-unsigned-ipa
          path: build/ipa/Chat.z.ai-unsigned.ipa

      - name: IPA Info
        run: ipa info build/ipa/Chat.z.ai-unsigned.ipa || true

name: Build Unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Validate shared scheme
        run: bundle exec ruby scripts/setup_schemes.rb

      - name: Apply unsigned signing
        run: bundle exec ruby scripts/sign_app.rb

      - name: Build app bundle
        run: |
          set -euo pipefail
          xcodebuild \
            -project Chat.z.ai.xcodeproj \
            -scheme Chat.z.ai \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Chat.z.ai.app"
          test -d "$APP_PATH"
          APP_BINARY_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Info.plist")
          test -f "$APP_PATH/$APP_BINARY_NAME"
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          (cd build/ipa && /usr/bin/zip -qry Chat.z.ai-unsigned.ipa Payload)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chat.z.ai-unsigned-ipa
          path: build/ipa/Chat.z.ai-unsigned.ipa

      - name: Create release tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "RELEASE_TAG=unsigned-ipa-${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Unsigned IPA Build #${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Publish IPA to GitHub Releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          files: build/ipa/Chat.z.ai-unsigned.ipa
          fail_on_unmatched_files: true
          generate_release_notes: true

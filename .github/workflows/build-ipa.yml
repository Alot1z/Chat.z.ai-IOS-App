name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'

      - name: Install Ruby dependencies
        run: |
          gem install shenzhen xcodeproj ios-deploy

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Ensure project and schemes
        run: ruby scripts/setup_schemes.rb

      - name: Configure unsigned signing
        run: ruby scripts/sign_app.rb

      - name: Build app (unsigned)
        run: |
          xcodebuild \
            -project Chat.z.ai.xcodeproj \
            -scheme Chat.z.ai \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          APP_PATH=$(find . -path "*Release-iphoneos/*.app" -type d | head -n 1)
          cp -R "$APP_PATH" build/ipa/Payload/
          (cd build/ipa && zip -r Chat.z.ai-unsigned.ipa Payload)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chat.z.ai-unsigned-ipa
          path: build/ipa/Chat.z.ai-unsigned.ipa

      - name: IPA metadata
        run: ipa info build/ipa/Chat.z.ai-unsigned.ipa || true

name: Build Unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Repair project and schemes
        run: bundle exec ruby scripts/setup_schemes.rb

      - name: Apply unsigned signing
        run: bundle exec ruby scripts/sign_app.rb

      - name: Build app bundle
        run: |
          set -euo pipefail
          xcodebuild \
            -project Chat.z.ai.xcodeproj \
            -scheme Chat.z.ai \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH=$(find build/DerivedData -type d -name '*.app' | head -n 1)
          test -n "$APP_PATH"
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          (cd build/ipa && /usr/bin/zip -qry Chat.z.ai-unsigned.ipa Payload)

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chat.z.ai-unsigned-ipa
          path: build/ipa/Chat.z.ai-unsigned.ipa
